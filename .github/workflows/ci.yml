name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  preflight-and-test:
    name: Preflight & Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Run CI Preflight Check
        run: |
          chmod +x ./scripts/ci_preflight_check.sh
          ./scripts/ci_preflight_check.sh

      - name: Run Cargo Tests
        run: cargo test