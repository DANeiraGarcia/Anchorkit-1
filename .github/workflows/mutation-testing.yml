name: Mutation Testing

# Mutation testing with cargo-mutants is slow (each surviving-candidate
# mutant triggers its own build + test run), so this runs on a schedule
# and on-demand rather than on every PR. See issue #102.
on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  mutants:
    name: cargo-mutants (src/contract.rs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation testing on the contract
        run: cargo mutants --file src/contract.rs -- --lib

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out
          path: mutants.out/
